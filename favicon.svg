<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Navy background square -->
  <rect width="32" height="32" rx="4" fill="#1D3557"/>
  <!-- Arch bridge icon centred, scaled down -->
  <path fill="#FFFFFF" fill-rule="evenodd" d="M 2,29 L 2,17 C 2,4 30,4 30,17 L 30,29 Z M 8,29 L 8,18 C 8,11 24,11 24,18 L 24,29 Z"/>
  <!-- Amber keystone diamond -->
  <polygon points="16,5 20,9 16,13 12,9" fill="#C49128"/>
  <!-- Stone coursing lines, left pier -->
  <line x1="2.5"  y1="21" x2="7.5"  y2="21" stroke="#142640" stroke-width="1" opacity="0.35"/>
  <line x1="2.5"  y1="25" x2="7.5"  y2="25" stroke="#142640" stroke-width="1" opacity="0.35"/>
  <!-- Stone coursing lines, right pier -->
  <line x1="24.5" y1="21" x2="29.5" y2="21" stroke="#142640" stroke-width="1" opacity="0.35"/>
  <line x1="24.5" y1="25" x2="29.5" y2="25" stroke="#142640" stroke-width="1" opacity="0.35"/>
  <!-- Base line -->
  <line x1="1"    y1="29" x2="31"   y2="29" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
</svg>
